---
layout: default
---
<article class="page-shell">
  {% if page.title %}
    <header class="page-header">
      <p class="eyebrow">Page</p>
      <h1>{{ page.title }}</h1>
      {% if page.lead %}<p class="lead">{{ page.lead }}</p>{% endif %}
    </header>
  {% endif %}
  <div class="prose">
    {{ content }}
  </div>
</article>
